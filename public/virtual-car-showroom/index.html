<script>
  (function() {
    // Insert the Wretched Lab logo once React has mounted
    function insertLogo() {
      // Check if already inserted
      if (document.getElementById('wl-logo')) return;
      // Find the container where the SVG logo will be mounted
      var main = document.querySelector('main');
      if (!main) return;
      var logo = document.createElement('div');
      logo.id = 'wl-logo';
      logo.innerHTML = '<span id="wl-logo-text">Wretched</span><span id="wl-logo-badge">Lab</span>';
      // Insert before the main content so it's in the same stacking context
      main.parentNode.insertBefore(logo, main);
    }

    // Wait for DOM to be ready, then poll until main is available
    var observer = new MutationObserver(function() {
      if (document.querySelector('main')) {
        insertLogo();
      }
    });
    document.addEventListener('DOMContentLoaded', function() {
      observer.observe(document.body, { childList: true, subtree: true });
      // Also try immediately in case it's already there
      insertLogo();
    });
  })();
</script></head><body><div id="__next"><main class="__variable_56e178"></main><!--$--><!--/$--></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{}},"page":"/","query":{},"buildId":"u1v7FerhsrLwWkAiHt-7L","assetPrefix":"/virtual-car-showroom","runtimeConfig":{"assetPrefix":"/virtual-car-showroom"},"nextExport":true,"autoExport":true,"isFallback":false,"scriptLoader":[]}</script>
